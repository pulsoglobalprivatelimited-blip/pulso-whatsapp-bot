services:
  - type: web
    name: pulso-whatsapp-bot
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run db:init && npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PUBLIC_BASE_URL
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WORKING_MODEL_AUDIO_MEDIA_ID
        sync: false
      - key: TERMS_AND_CONDITIONS_URL
        sync: false
      - key: OWNER_NOTIFICATION_PHONE
        value: "919446600809"
      - key: AGENT_HELP_WHATSAPP_NUMBER
        value: "919446600809"
      - key: SECONDARY_NOTIFICATION_PHONE
        value: "917736129809"
      - key: TERMS_REMINDER_DELAY_HOURS
        value: "24"
      - key: TERMS_REMINDER_CHECK_INTERVAL_MINUTES
        value: "30"
      - key: TERMS_REMINDER_RESUME_KEYWORD
        value: "continue"
      - key: TERMS_REMINDER_TEMPLATE_NAME
        sync: false
      - key: TERMS_REMINDER_TEMPLATE_LANGUAGE
        value: "en"
      - key: WHATSAPP_DRY_RUN
        value: "false"
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: MEDIA_STORAGE_DIR
        value: /var/data/pulso-media
