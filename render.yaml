services:
  - type: web
    name: pulso-whatsapp-bot
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run db:init && npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PUBLIC_BASE_URL
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: PROVIDER_SUPPORT_WHATSAPP_PHONE_NUMBER_ID
        value: "1152619794595125"
      - key: PROVIDER_SUPPORT_BOT_WHATSAPP_NUMBER
        value: "917736129809"
      - key: IGNORED_WHATSAPP_PHONE_NUMBER_IDS
        value: "1086315334572855"
      - key: IGNORED_WHATSAPP_DISPLAY_PHONE_NUMBERS
        value: "917736101039"
      - key: PROVIDER_SUPPORT_JOINING_CHATBOT_URL
        value: "https://wa.me/917736167744"
      - key: PROVIDER_SUPPORT_CUSTOMER_CARE_WHATSAPP_URL
        value: "https://wa.me/919446600809"
      - key: PROVIDER_SUPPORT_PHONE
        value: "8714105333"
      - key: PROVIDER_SUPPORT_ANDROID_APP_URL
        value: "https://play.google.com/store/apps/details?id=com.pulso.global"
      - key: PROVIDER_SUPPORT_IOS_APP_URL
        value: "https://apps.apple.com/in/app/pulso/id6757874217"
      - key: WORKING_MODEL_AUDIO_MEDIA_ID
        sync: false
      - key: PULSO_DUTY_ACCEPT_VIDEO_MEDIA_ID
        sync: false
      - key: PULSO_APP_ACTIVATION_VIDEO_MEDIA_ID
        sync: false
      - key: TERMS_AND_CONDITIONS_URL
        sync: false
      - key: IVR_STAFF_PHONE
        sync: false
      - key: IVR_RECRUITMENT_WHATSAPP_NUMBER
        value: "917736167744"
      - key: IVR_WEBHOOK_SECRET
        sync: false
      - key: IVR_WEBHOOK_ALLOWED_IPS
