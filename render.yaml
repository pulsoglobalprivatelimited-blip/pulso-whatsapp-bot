      - key: IVR_JOB_WHATSAPP_TEMPLATE_LANGUAGE_ML
        value: "ml"
      - key: OWNER_NOTIFICATION_PHONE
        value: "919446600809"
      - key: AGENT_HELP_WHATSAPP_NUMBER
        value: "919446600809"
      - key: SECONDARY_NOTIFICATION_PHONE
        value: "917736129809"
      - key: CERTIFICATE_REVIEW_TEMPLATE_NAME
        value: "certificate_review_alert"
      - key: CERTIFICATE_REVIEW_TEMPLATE_LANGUAGE
        value: "en"
      - key: TERMS_REMINDER_DELAY_HOURS
        value: "24"
      - key: TERMS_REMINDER_CHECK_INTERVAL_MINUTES
        value: "30"
